name: Build & Package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller yt-dlp
      - name: Generate icons
        run: python build/generate_icons.py
        env:
          QT_QPA_PLATFORM: offscreen
      - name: Build with PyInstaller
        run: pyinstaller doda-player.spec
      - name: Install Inno Setup
        run: |
          choco install innosetup --no-progress -y
          echo "ISCC_DIR=C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_ENV
      - name: Build Inno Setup installer
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (Test-Path $iscc) {
            & $iscc build/installer/windows/setup.iss
          } else {
            Write-Warning "Inno Setup not found, skipping installer"
            New-Item -ItemType Directory -Path build/installer/windows/Output -Force
            Compress-Archive -Path dist/doda-player/* -DestinationPath build/installer/windows/Output/DodaMediaPlayer-0.1.1-Portable.zip
          }
      - uses: actions/upload-artifact@v4
        with:
          name: DodaMediaPlayer-Windows
          path: build/installer/windows/Output/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libegl1-mesa-dev \
            libxkbcommon-x11-0 libxcb-cursor0 \
            libfuse2 desktop-file-utils wget
      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller yt-dlp
      - name: Generate icons
        run: QT_QPA_PLATFORM=offscreen python build/generate_icons.py
      - name: Build with PyInstaller
        run: pyinstaller doda-player.spec
      - name: Build AppImage
        run: bash build/installer/linux/appimage.sh
      - name: Build .deb package
        run: bash build/installer/linux/build-deb.sh
      - uses: actions/upload-artifact@v4
        with:
          name: DodaMediaPlayer-Linux
          path: build/installer/linux/Output/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller yt-dlp
      - name: Generate icons + icns
        run: QT_QPA_PLATFORM=offscreen python build/generate_icons.py
      - name: Build with PyInstaller
        run: pyinstaller doda-player.spec
      - name: Create DMG
        run: bash build/installer/macos/create-dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: DodaMediaPlayer-macOS
          path: build/installer/macos/Output/*

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DodaMediaPlayer-Windows/*.exe
            DodaMediaPlayer-Windows/*.zip
            DodaMediaPlayer-Linux/*.AppImage
            DodaMediaPlayer-Linux/*.deb
            DodaMediaPlayer-macOS/*.dmg
